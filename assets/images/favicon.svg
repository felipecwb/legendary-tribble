<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle (cracked) -->
  <circle cx="32" cy="32" r="30" fill="#d33833" stroke="#222" stroke-width="2"/>
  
  <!-- Crack lines -->
  <path d="M32 2 L35 15 L30 20 L33 32" stroke="#222" stroke-width="2" fill="none"/>
  <path d="M33 32 L38 40 L32 50 L35 62" stroke="#222" stroke-width="2" fill="none"/>
  <path d="M33 32 L20 38 L15 45" stroke="#222" stroke-width="2" fill="none"/>
  
  <!-- Butler/robot head (broken) -->
  <ellipse cx="32" cy="28" rx="14" ry="12" fill="#f0d6b4" stroke="#222" stroke-width="1.5"/>
  
  <!-- Hair/hat (messy) -->
  <path d="M18 24 Q20 14, 32 12 Q44 14, 46 24" fill="#333" stroke="#222" stroke-width="1"/>
  <path d="M22 18 L20 10 L25 15" fill="#333"/>
  <path d="M42 18 L44 10 L39 15" fill="#333"/>
  
  <!-- Eyes (X_X dead eyes) -->
  <g stroke="#222" stroke-width="2">
    <!-- Left X eye -->
    <line x1="24" y1="24" x2="30" y2="30"/>
    <line x1="30" y1="24" x2="24" y2="30"/>
    <!-- Right X eye (glitched/offset) -->
    <line x1="36" y1="25" x2="42" y2="31"/>
    <line x1="42" y1="25" x2="36" y2="31"/>
  </g>
  
  <!-- Mouth (error/glitch) -->
  <path d="M26 38 L30 36 L34 40 L38 35" stroke="#222" stroke-width="2" fill="none"/>
  
  <!-- Bowtie (crooked) -->
  <polygon points="26,46 32,50 38,46 32,48" fill="#d33833" stroke="#222" stroke-width="1" transform="rotate(8, 32, 48)"/>
  
  <!-- Error sparks -->
  <g fill="#ffcc00" stroke="#ff6600" stroke-width="0.5">
    <polygon points="50,15 53,18 50,21 47,18"/>
    <polygon points="12,40 15,43 12,46 9,43"/>
    <polygon points="48,45 51,48 48,51 45,48"/>
  </g>
  
  <!-- 500 error text -->
  <text x="32" y="60" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">500</text>
</svg>
