<header class="site-header" style="position: relative;">
  <div class="wrapper" style="display: flex; justify-content: space-between; align-items: center;">
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>

    <div style="display: flex; align-items: center; gap: 12px;">
      <a href="{{ '/' | relative_url }}" title="English" style="text-decoration: none; font-size: 1.3em;">🇺🇸</a>
      <a href="{{ '/pt-br/' | relative_url }}" title="Português" style="text-decoration: none; font-size: 1.3em;">🇧🇷</a>
      <button type="button" id="theme-toggle-btn" aria-label="Toggle theme" style="width: 36px; height: 36px; border-radius: 50%; border: 1px solid #ccc; background: transparent; cursor: pointer; font-size: 1.2em; padding: 0; line-height: 1;">🌙</button>
    </div>
  </div>
</header>

<script>
(function() {
  var btn = document.getElementById('theme-toggle-btn');
  if (!btn) return;
  
  var theme = document.documentElement.getAttribute('data-theme') || 'light';
  btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    btn.textContent = next === 'dark' ? '☀️' : '🌙';
  });
})();
</script>
