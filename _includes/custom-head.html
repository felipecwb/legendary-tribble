<style>
.lang-switch {
  position: absolute;
  right: 20px;
  top: 20px;
  font-size: 1.2em;
}
.lang-switch a, .lang-switch button {
  text-decoration: none;
  margin: 0 5px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1em;
  padding: 0;
}
@media (max-width: 600px) {
  .lang-switch {
    position: relative;
    right: 0;
    top: 0;
    text-align: center;
    margin-bottom: 10px;
  }
}

/* Dark mode styles */
html[data-theme="dark"] {
  --minima-brand-color: #79b8ff;
  --minima-brand-color-light: #79b8ff;
  --minima-brand-color-dark: #79b8ff;
  --minima-site-title-color: #79b8ff;
  --minima-text-color: #c9d1d9;
  --minima-background-color: #0d1117;
  --minima-code-background-color: #161b22;
  --minima-border-color: #30363d;
  --minima-table-text-color: #c9d1d9;
  --minima-table-zebra-color: #161b22;
  --minima-table-header-bg-color: #21262d;
  --minima-table-header-border: #30363d;
  --minima-table-border-color: #30363d;
}

html[data-theme="dark"] body {
  background-color: #0d1117;
  color: #c9d1d9;
}

html[data-theme="dark"] a {
  color: #58a6ff;
}

html[data-theme="dark"] .site-header {
  background-color: #161b22;
  border-bottom-color: #30363d;
}

html[data-theme="dark"] .site-footer {
  background-color: #161b22;
  border-top-color: #30363d;
}

html[data-theme="dark"] code {
  background-color: #161b22;
  border-color: #30363d;
}

html[data-theme="dark"] pre, html[data-theme="dark"] pre.highlight {
  background-color: #161b22;
  border-color: #30363d;
}

html[data-theme="dark"] .post-meta {
  color: #8b949e;
}

html[data-theme="dark"] table th {
  background-color: #21262d;
  border-color: #30363d;
}

html[data-theme="dark"] table td {
  border-color: #30363d;
}

html[data-theme="dark"] table tr:nth-child(even) {
  background-color: #161b22;
}
</style>

<script>
(function() {
  const toggle = () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateIcon(next);
  };

  const updateIcon = (theme) => {
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  };

  const init = () => {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = saved || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    updateIcon(theme);
    
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.addEventListener('click', toggle);
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  
  // Also run on page load to ensure icon is set
  window.addEventListener('load', init);
})();
</script>
