<script>
(function() {
  var saved = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<style>
/* Dark mode */
html[data-theme="dark"] body { background: #0d1117; color: #c9d1d9; }
html[data-theme="dark"] a { color: #58a6ff; }
html[data-theme="dark"] a:visited { color: #8b949e; }
html[data-theme="dark"] .site-header { background: #161b22; border-color: #30363d; }
html[data-theme="dark"] .site-title, html[data-theme="dark"] .site-title:visited { color: #58a6ff; }
html[data-theme="dark"] .site-nav .page-link { color: #c9d1d9; }
html[data-theme="dark"] .site-footer { background: #161b22; border-color: #30363d; color: #8b949e; }
html[data-theme="dark"] code { background: #161b22; border-color: #30363d; color: #c9d1d9; }
html[data-theme="dark"] pre, html[data-theme="dark"] pre.highlight { background: #161b22; border-color: #30363d; }
html[data-theme="dark"] .post-meta { color: #8b949e; }
html[data-theme="dark"] .post-link { color: #58a6ff; }
html[data-theme="dark"] h1, html[data-theme="dark"] h2, html[data-theme="dark"] h3, html[data-theme="dark"] h4 { color: #c9d1d9; }
html[data-theme="dark"] table th { background: #21262d; border-color: #30363d; color: #c9d1d9; }

</style>
